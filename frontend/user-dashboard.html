<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard - Gyaanuday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="top-nav glass">
    <a class="brand" href="index.html">
      <span class="brand-dot"></span>
      <span>Gyaanuday</span>
    </a>
    <nav class="nav-links" style="display: flex; align-items: center; gap: 1.5rem;">
      <div style="position: relative; display: flex; align-items: center;">
        <form id="navFriendSearchForm" class="nav-search-form">
          <span class="nav-search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
          <input type="text" id="navFriendSearchInput" class="nav-search-input" placeholder="Search users...">
        </form>
        <ul id="navFriendSearchResults"></ul>
      </div>
      <a href="index.html">Home</a>
      <a href="index.html#explore">Explore</a>
      <a href="network.html">Network</a>
      <a href="user-dashboard.html" class="active">User Dashboard</a>
      <button type="button" class="btn theme-icon" onclick="toggleTheme()" style="background: transparent; border: none; font-size: 1.2rem; padding: 0 5px; cursor: pointer;" aria-label="Toggle Theme">☀️</button>
      <button id="logoutNavBtn" class="btn btn-secondary nav-logout" type="button">Logout</button>
    </nav>
  </header>

  <main style="padding-top: 100px; min-height: 100vh;">
    <section id="dashboard" class="page section active">
        <div class="dashboard-header reveal" style="display: flex; gap: 1.5rem; align-items: center; margin-bottom: 2rem; text-align: left; flex-wrap: wrap;">
          <div style="position: relative; flex-shrink: 0;" id="dashProfilePicContainerParent">
            <div style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--border); background: rgba(99, 102, 241, 0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #a5b4fc;" id="dashProfilePicContainer">
              <span id="dashProfileInitials">👤</span>
              <img id="dashProfileImg" src="" alt="Profile" style="width: 100%; height: 100%; object-fit: cover; display: none;" />
            </div>
            <!-- Pencil Edit Button on Edge -->
            <button type="button" id="profilePicEditBtn" aria-label="Change profile picture" style="position: absolute; bottom: 0; right: 0; width: 32px; height: 32px; border-radius: 50%; background: #6366f1; border: 2px solid #0f172a; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; color: white; transition: transform 0.2s ease, background 0.2s ease;" onmouseover="this.style.transform='scale(1.1)'; this.style.background='#4f46e5';" onmouseout="this.style.transform='scale(1)'; this.style.background='#6366f1';">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            <input type="file" id="profilePictureInput" accept="image/*" style="display: none;" />
          </div>
          <div>
            <h1 style="font-size: 2.2rem; margin-bottom: 0.25rem;">Welcome back, <span id="dashUserName" class="gradient-text">Creator</span>!</h1>
            <p id="dashUserBio" style="color: var(--text-secondary); max-width: 600px; line-height: 1.5;">Manage your portfolio and showcase your latest innovations.</p>
          </div>
        </div>

        <div class="dashboard-layout" style="display: flex; flex-direction: column; gap: 2rem; max-width: 1300px; margin: 0 auto;">
          <div class="stats-row" style="display: flex; gap: 1.5rem; margin-bottom: 1rem;">
             <article class="stat-card glass reveal visible" style="padding: 1.25rem 1.75rem; display: flex; align-items: center; gap: 1.25rem; border: 1px solid rgba(255,255,255,0.08); min-width: 280px;">
                <div class="stat-icon" style="font-size: 1.5rem; background: rgba(99, 102, 241, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">🚀</div>
                <div>
                  <h3 id="userTotalUploads" style="font-size: 1.75rem; font-weight: 800; margin: 0;">0</h3>
                  <p style="color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.7rem; font-weight: 600; margin-top: 2px;">Total Projects</p>
                </div>
              </article>
          </div>

          <div class="dash-content-grid" style="display: flex; gap: 2rem; align-items: flex-start;">
            <!-- Left Column: Profile & Projects -->
            <div style="flex: 1.4; display: flex; flex-direction: column; gap: 2rem;">
              <section id="dashPanelProfile" class="dash-panel active">
                <div class="activity-card glass reveal visible">
                  <h3 style="margin-bottom: 1.5rem;">Profile Settings</h3>
                  <form id="profileUpdateForm" class="upload-form" novalidate style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <label>
                      Bio
                      <textarea id="profileBioInput" rows="3" placeholder="Tell us about yourself..."></textarea>
                    </label>
                    <button type="submit" id="profileSubmitBtn" class="btn btn-primary" style="width: 100%; padding: 12px;">Save Profile</button>
                  </form>
                </div>
              </section>

              <section id="dashPanelUser" class="dash-panel active">
                <div class="activity-card glass reveal visible" style="height: 100%;">
                  <h3 style="margin-bottom: 1.5rem;">Your Projects</h3>
                  <ul id="userProjectsList" style="padding: 0;">
                    <li>Loading your projects...</li>
                  </ul>
                </div>
              </section>
            </div>

            <!-- Right Column: Upload New Project & Network -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 2rem;">
              <section id="dashPanelUpload" class="dash-panel active">
                <div class="activity-card glass" style="padding: 2rem;">
                  <h3 style="margin-bottom: 1.5rem;">Upload Project</h3>
                  <form id="uploadForm" class="upload-form" novalidate style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <label>
                      Title
                      <input required type="text" id="projectTitle" placeholder="Awesome AI Bot" />
                    </label>
                    <label>
                      Domain
                      <select required id="projectDomain">
                        <option value="">Select domain</option>
                        <option value="AI">AI/ML</option>
                        <option value="Web Dev">Web Development</option>
                        <option value="IoT">IoT</option>
                        <option value="Mobile">Mobile</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Cybersecurity">Cybersecurity</option>
                        <option value="Other">Other</option>
                      </select>
                    </label>
                    
                    <label>
                      Description
                      <textarea required id="projectDescription" rows="3" placeholder="Briefly describe what your project does..."></textarea>
                    </label>
                    
                    <label>
                      Tags (comma separated)
                      <input type="text" id="projectTags" placeholder="AI, Machine Learning, Python" />
                    </label>

                    <div class="dual-section" style="display: grid; grid-template-columns: 1fr; gap: 1.25rem;">
                      <label>
                        GitHub Repo
                        <input type="url" id="projectGithub" placeholder="https://github.com/..." />
                      </label>
                      <label>
                        Live Link
                        <input type="url" id="projectDeploy" placeholder="https://..." />
                      </label>
                    </div>

                    <label>
                      Project Folder
                      <div id="dropZone" class="drop-zone" style="padding: 1.5rem; font-size: 0.9rem;">
                        <p>Drag & drop files here</p>
                        <input id="fileInput" type="file" multiple />
                      </div>
                      <p id="fileList" class="file-list" style="font-size: 0.8rem;"></p>
                    </label>

                    <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%; padding: 12px;">Submit Project</button>
                  </form>
                </div>
              </section>
              </section>
            </div>
          </div>
    </section>
  </main>

  <!-- Edit Project Modal -->
  <div id="editProjectModal" class="project-modal hidden" aria-hidden="true">
    <div class="project-modal-backdrop" data-close-edit-modal="true"></div>
    <article class="project-modal-card glass" role="dialog" aria-modal="true" style="max-width: 600px;">
      <button id="editModalClose" type="button" class="project-modal-close" aria-label="Close">×</button>
      <h3>Edit Project</h3>
      <form id="editProjectForm" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        <input type="hidden" id="editProjectId" />
        <label>
          Title
          <input required type="text" id="editProjectTitle"
            style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;" />
        </label>
        <label>
          Domain
          <select required id="editProjectDomain" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
            <option value="AI">AI/ML</option>
            <option value="Web Dev">Web Development</option>
            <option value="IoT">IoT</option>
            <option value="Mobile">Mobile</option>
            <option value="Data Science">Data Science</option>
            <option value="Cybersecurity">Cybersecurity</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label>
          Difficulty
          <select required id="editProjectDifficulty" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </label>
        <label>
          Description
          <textarea required id="editProjectDescription" rows="4"
            style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;"></textarea>
        </label>
        <label>
          Tags (comma separated)
          <input type="text" id="editProjectTags" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;" />
        </label>
        <div class="dual-section" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <label>
            GitHub Link
            <input type="url" id="editProjectGithub" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;" />
          </label>
          <label>
            Deployment Link
            <input type="url" id="editProjectDeploy" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;" />
          </label>
        </div>
        <button type="submit" class="btn btn-primary" id="editProjectSubmitBtn">Save Changes</button>
      </form>
    </article>
  </div>

  <div id="toastStack" class="toast-stack"></div>
  <script src="script.js"></script>
</body>

</html>
