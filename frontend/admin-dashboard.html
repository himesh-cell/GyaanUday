<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Gyaanuday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-blobs" aria-hidden="true">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
      <span class="blob blob-3"></span>
    </div>

    <header class="top-nav glass">
      <a class="brand" href="index.html">
        <span class="brand-dot"></span>
        <span>Gyaanuday</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#explore">Explore</a>
        <a href="admin-dashboard.html" class="active">Admin Dashboard</a>
        <button type="button" class="btn theme-icon" onclick="toggleTheme()" style="background: transparent; border: none; font-size: 1.2rem; padding: 0 5px; cursor: pointer;" aria-label="Toggle Theme">☀️</button>
        <button id="logoutNavBtn" class="btn btn-secondary nav-logout" type="button">Logout</button>
      </nav>
    </header>

    <main style="padding-top: 100px; min-height: 100vh;">
      <section id="dashboard" class="page section active">
        <div class="dashboard-header reveal" style="margin-bottom: 2rem; text-align: left;">
          <h1 style="font-size: 2.2rem; margin-bottom: 0.25rem;">Admin <span class="gradient-text">Control Center</span></h1>
          <p style="color: var(--text-secondary);">Oversee platform growth and manage community members.</p>
        </div>

        <div class="dashboard-layout" style="display: flex; flex-direction: column; gap: 2rem; width: 100%; margin: 0 auto;">
          <div class="dash-content-grid" style="display: flex; gap: 2rem; align-items: flex-start; width: 100%;">
            <!-- Stats Column (Left) -->
            <div class="stats-sidebar" style="display: flex; flex-direction: column; gap: 1.5rem; width: 280px; flex-shrink: 0;">
              <article class="stat-card glass reveal visible" style="padding: 1.5rem 1.75rem; display: flex; align-items: center; gap: 1.25rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;">
                <div class="stat-icon" style="font-size: 1.5rem; background: rgba(99, 102, 241, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">👥</div>
                <div>
                  <h3 id="adminTotalUsers" style="font-size: 1.75rem; font-weight: 800; margin: 0;">0</h3>
                  <p style="color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.7rem; font-weight: 600; margin-top: 2px;">Total Users</p>
                </div>
              </article>
              <article class="stat-card glass reveal visible" style="padding: 1.5rem 1.75rem; display: flex; align-items: center; gap: 1.25rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;">
                <div class="stat-icon" style="font-size: 1.5rem; background: rgba(16, 185, 129, 0.1); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">📦</div>
                <div>
                  <h3 id="adminTotalProjects" style="font-size: 1.75rem; font-weight: 800; margin: 0;">0</h3>
                  <p style="color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.7rem; font-weight: 600; margin-top: 2px;">Total Projects</p>
                </div>
              </article>
            </div>

            <!-- Manage Users (Right) -->
            <section id="dashPanelAdmin" class="dash-panel active" style="flex: 1;">
              <div class="activity-card glass reveal visible" style="border-radius: 24px; padding: 2rem;">
                <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Manage Users</h3>
                <ul id="adminUserList" style="padding: 0; display: flex; flex-direction: column; gap: 1rem;">
                  <li>Loading users...</li>
                </ul>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <div id="toastStack" class="toast-stack"></div>
    <script src="script.js"></script>
  </body>
</html>
